apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-b0d0b7160a711d00caa82e90c97ea0be68c20b19
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
