apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-5b66e75d156557c8bc3aa3ef75960ad1367093af
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
