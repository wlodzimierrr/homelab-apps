apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-e9542ba79334443f3bc11ce6fe87fdecb8e5be6b
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
