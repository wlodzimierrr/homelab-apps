apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-ef1ec7d177471b1f3b773ca8cde90dc5d6a36199
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
