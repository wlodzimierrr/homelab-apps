apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-b1e84af9ad4c93b626899974256bb2cdd10d1fe5
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
