apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-d51f4eec06ed69e066c30316528a8bacbd49ff8f
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
