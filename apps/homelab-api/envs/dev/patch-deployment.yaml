apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-021bfe96c1bb934ae2f45264693294732a6d3964
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
