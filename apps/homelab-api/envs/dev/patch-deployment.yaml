apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-f3e0f15f5678d47f9efe0caf9ab8e2c2eaf67d2d
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
