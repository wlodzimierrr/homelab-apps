apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-f566fdc76bf0479673d7167765bdc083adfe8715
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
