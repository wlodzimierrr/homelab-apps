apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-2112a144b79b570c66e537868cc4201fe9b117b3
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
