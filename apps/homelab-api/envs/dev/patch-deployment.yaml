apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-531a321e1a650eb5ecce20b941ced609cac4d38f
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
