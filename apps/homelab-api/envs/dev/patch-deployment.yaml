apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-api
  namespace: homelab-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/wlodzimierrr/homelab-api:sha-fe815dbfaf2070c82854adf0b880e56c9f92ee69
          env:
            - name: APP_ENV
              value: dev
            - name: LOG_LEVEL
              value: debug
