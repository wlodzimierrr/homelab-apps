apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homelab-api-backend-kube-api-read
  labels:
    app.kubernetes.io/name: homelab-api
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - pods
      - services
      - endpoints
    verbs:
      - get
      - list
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
