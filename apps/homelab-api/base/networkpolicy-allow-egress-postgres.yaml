apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-postgres
  namespace: homelab-api
spec:
  podSelector:
    matchLabels:
      homelab.io/db-client: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homelab-api
              app.kubernetes.io/component: postgres
      ports:
        - protocol: TCP
          port: 5432
